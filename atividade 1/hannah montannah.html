            <h2>Introdução ao filme</h2>
            <p>Lançado em 2003 pela pixa animation Studios,"procurando nemo" rapidamente se tornou
                <strong>fenômeno</strong> cultural, encantando publicos de todas as idades ao redor do mundo. A historia foi dirigida por Andrew Staton e Lee Unkrich,
                e conta com uma trilha sonora emocionante que complementa perfeitamente cada cena.
            </p>
            <hr> <!--Linha divisória entre seções-->

            <h2>História e enredo</h2>
            <p>A trama gira em torno de Marlin, um peixe-palhaço extremamente protetor, que perde seu filho nemo após um incidente com um mergulhador.</p>
            Determinado a resgatá-lo, Mrlin embarca em uma aventura pelo oceano, onde conhece dory - uma peixe-palhaço azul com problemas de memória curta, 
            mas com um coração gigante.</p>
            <hr> <!--Linha divisória entre seções-->
            <!--seção 3 com subtitulo(h2)e parágrafo--> (p)-->
            <h2>Legado e reconhecimentos</h2>
            <p>O filme ganhou o Oscar de melhor filme de animação e arrecadou mais de 940 milhões de dólares em bilheteria mundial. Além disso,ele ajudou a aumentar,
                a conscientização sobre a preservação dos ecossistemas marinhos, mostrando a beleza e a fragilidade da vida e no oceano.
            </p>
